<!DOCTYPE html>
<html>
<head>

<title>ReviewGuard Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<h1 class="text-center mb-4">
ReviewGuard Analytics Dashboard
</h1>

<div class="row">

<div class="col-md-3">
<div class="card shadow p-3">
<h4>Total Reviews</h4>
<h2>{{ total_reviews }}</h2>
</div>
</div>

<div class="col-md-3">
<div class="card shadow p-3">
<h4>Genuine</h4>
<h2>{{ genuine_reviews }}</h2>
</div>
</div>

<div class="col-md-3">
<div class="card shadow p-3">
<h4>Suspicious</h4>
<h2>{{ suspicious_reviews }}</h2>
</div>
</div>

<div class="col-md-3">
<div class="card shadow p-3">
<h4>Avg Trust</h4>
<h2>{{ avg_trust }}%</h2>
</div>
</div>
</div>
</div>

</body>
</html>
